<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>Accesso riservato</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #ffffff;
}

.login-box {
  text-align: center;
}

input {
  padding: 12px;
  font-size: 16px;
  width: 220px;
  border: 1px solid #ccc;
}

button {
  padding: 12px 16px;
  font-size: 16px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
  margin-left: 8px;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Accesso riservato</h2>
  <input type="password" id="password">
  <button onclick="checkPassword()">Entra</button>
</div>

<script>
function checkPassword() {
  var entered = document.getElementById("password").value;
  var correct = "TIA2026"; // CAMBIA PASSWORD QUI

  if (entered === correct) {
    sessionStorage.setItem("authenticated", "true");
    window.location.href = "menu.html";
  } else {
    alert("Password errata");
  }
}
</script>

</body>
</html>
